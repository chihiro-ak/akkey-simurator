</div>

</div>

<button class="flex flex-col items-center gap-3 group">
<div class="w-full aspect-square bg-white dark:bg-slate-800 border-2 border-transparent rounded-3xl flex items-center justify-center text-slate-400 group-hover:bg-slate-50 transition-colors shadow-[0_4px_15px_-3px_rgba(0,0,0,0.05)]">
<span class="material-symbols-outlined text-4xl">pets</span>
</div>
<span class="text-base font-medium text-slate-500 dark:text-slate-400">猫</span>

</div>
</section>
</div>

<div class="flex items-center justify-between mb-4 pl-1">

</div>
<div class="flex bg-slate-100 dark:bg-slate-800 p-1.5 rounded-full shadow-inner border border-slate-200/60 dark:border-slate-700 w-64">

<button class="flex-1 py-2 text-sm font-medium text-slate-500 dark:text-slate-400 rounded-full hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors">
